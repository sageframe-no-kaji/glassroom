<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Glassroom{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; }
    nav { background: #1a1a2e; color: #fff; padding: 0 1.5rem; display: flex; align-items: center; gap: 1.5rem; height: 52px; }
    nav a { color: #ccc; text-decoration: none; font-size: 0.95rem; }
    nav a:hover, nav a.active { color: #fff; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; margin-right: 1rem; }
    nav .spacer { flex: 1; }
    nav .last-scraped { font-size: 0.8rem; color: #888; }
    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.4rem; margin: 0 0 1rem; }
    h2 { font-size: 1.1rem; margin: 0; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 1.2rem; overflow: hidden; }
    .card-header { padding: 0.75rem 1rem; background: #f8f8f8; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 1rem; cursor: pointer; }
    .card-header:hover { background: #f0f0f0; }
    .card-body { padding: 0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead { background: #f8f8f8; }
    th { text-align: left; padding: 0.5rem 0.75rem; font-weight: 600; color: #555; border-bottom: 1px solid #e0e0e0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.03em; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    a { color: #2563eb; }
    a:hover { text-decoration: underline; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
    .badge-assigned   { background: #fef9c3; color: #854d0e; }
    .badge-turned-in  { background: #dbeafe; color: #1e40af; }
    .badge-graded     { background: #dcfce7; color: #166534; }
    .badge-done       { background: #dcfce7; color: #166534; }
    .badge-missing    { background: #fee2e2; color: #991b1b; }
    .badge-unknown    { background: #f3f4f6; color: #6b7280; }
    .badge-excused    { background: #f3e8ff; color: #6b21a8; }
    .stats { display: flex; gap: 1rem; font-size: 0.8rem; }
    .stats .stat { display: flex; align-items: center; gap: 0.3rem; }
    .stat-val { font-weight: 700; }
    .stat-missing .stat-val { color: #dc2626; }
    .stat-attention .stat-val { color: #d97706; }
    .btn { display: inline-block; padding: 0.35rem 0.85rem; border-radius: 4px; border: none; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; color: #fff; text-decoration: none; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-secondary:hover { background: #d1d5db; text-decoration: none; }
    .btn-sm { padding: 0.2rem 0.6rem; font-size: 0.8rem; }
    .empty-state { padding: 2rem; text-align: center; color: #999; }
    .turn-in-badge { font-size: 0.7rem; background: #f3f4f6; color: #6b7280; border-radius: 3px; padding: 0.1rem 0.35rem; }
    details summary { list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    .chevron { font-size: 0.8rem; color: #999; transition: transform 0.15s; }
    details[open] .chevron { display: inline-block; transform: rotate(90deg); }
  </style>
</head>
<body>
<nav>
  <span class="brand">Glassroom</span>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
  <a href="/todo" {% if request.path == '/todo' %}class="active"{% endif %}>To Do</a>
  <a href="/downloads" {% if request.path == '/downloads' %}class="active"{% endif %}>Downloads</a>
  <span class="spacer"></span>
  <a href="/api/export/csv" class="btn btn-secondary btn-sm">Export CSV</a>
  <form action="/api/scrape" method="post" style="margin:0">
    <button type="submit" class="btn btn-primary btn-sm">Scrape</button>
  </form>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
