[mypy]
strict = True
python_version = 3.14

# Test files don't need complete type annotations — fixtures, monkeypatch,
# and pytest patterns make strict annotation impractical without value.
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
check_untyped_defs = True
